name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Alembic migration (SQLite smoke)
        run: |
          rm -f data/ci_alembic.db
          DATABASE_URL=sqlite:///./data/ci_alembic.db alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
