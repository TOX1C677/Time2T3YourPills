name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - "v*"
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Alembic migration (SQLite smoke)
        run: |
          mkdir -p data
          rm -f data/ci_alembic.db
          DATABASE_URL=sqlite:///./data/ci_alembic.db alembic upgrade head
      - name: Run tests
        run: pytest tests/ -v

  flutter:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # Сборка релиза Android после успешных тестов; не гоняется на PR (экономия минут).
  # Запуск: push тега v*, либо Actions → Run workflow (workflow_dispatch).
  android-release:
    name: Android release (APK + AAB)
    needs: [backend, flutter]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build release APK
        run: flutter build apk --release
      - name: Build release App Bundle
        run: flutter build appbundle --release
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.ref_name }}-${{ github.sha }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 60
